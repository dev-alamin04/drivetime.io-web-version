<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — DriveTime</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: #f0f2f5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-card {
            background: #fff;
            border-radius: 16px;
            padding: 40px 36px;
            width: 100%;
            max-width: 420px;
            border: 1px solid #e8e8e8;
        }

        .brand-icon {
            width: 52px;
            height: 52px;
            background: #1D9E75;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 14px;
        }

        .form-control:focus {
            border-color: #1D9E75;
            box-shadow: 0 0 0 3px rgba(29, 158, 117, 0.1);
        }

        .btn-primary {
            background: #1D9E75;
            border-color: #1D9E75;
            font-weight: 500;
            padding: 11px;
        }

        .btn-primary:hover {
            background: #178a65;
            border-color: #178a65;
        }

        .btn-primary:disabled {
            background: #a8d5c5;
            border-color: #a8d5c5;
        }

        .error-msg {
            display: none;
        }
    </style>
</head>

<body>

    <div class="login-card shadow-sm">
        <div class="text-center mb-4">
            <div class="brand-icon">
                <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="8" r="4" />
                    <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7" />
                </svg>
            </div>
            <h5 class="fw-semibold mb-1" id="txt-welcome"></h5>
            <p class="text-muted small mb-0" id="txt-subtitle"></p>
        </div>

        <div id="error-msg" class="alert alert-danger py-2 small error-msg"></div>

        <div class="mb-3">
            <label class="form-label small fw-medium" id="txt-email-label"></label>
            <input type="email" id="email" class="form-control" id="txt-email-input">
        </div>

        <div class="mb-4">
            <label class="form-label small fw-medium" id="txt-password-label"></label>
            <input type="password" id="password" class="form-control" id="txt-password-input">
        </div>

        <button id="btn-login" class="btn btn-primary w-100" onclick="login()"></button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="translations.js"></script>
    <script>
        const IS_LOCAL = window.location.hostname === 'localhost'
            || window.location.hostname.includes('.test');

        // const API_BASE = IS_LOCAL
        //     ? 'http://ibrahimcheikh_laravel.test/api'
        //     : 'https://ibrahim.thewarriors.team/api';


        const API_BASE = 'http://ibrahimcheikh_laravel.test/api';
        // Apply translations
        function applyLang() {
            document.getElementById('txt-welcome').textContent = t('welcome_back');
            document.getElementById('txt-subtitle').textContent = t('sign_in_subtitle');
            document.getElementById('txt-email-label').textContent = t('email_label');
            document.getElementById('txt-password-label').textContent = t('password_label');
            document.getElementById('email').placeholder = t('email_placeholder');
            document.getElementById('password').placeholder = t('password_placeholder');
            document.getElementById('btn-login').textContent = t('sign_in_btn');
        }

        applyLang();

        async function apiCall(endpoint, method = 'GET', data = null) {
            const token = localStorage.getItem('token');
            const options = {
                method,
                headers: {
                    'Content-Type': 'application/json',
                    'Accept': 'application/json',
                    ...(token && { 'Authorization': `Bearer ${token}` }),
                },
            };
            if (data) options.body = JSON.stringify(data);
            try {
                const response = await fetch(API_BASE + endpoint, options);
                return await response.json();
            } catch (err) {
                console.error('API Error:', err);
                return { success: false, message: 'Network error!' };
            }
        }

        async function login() {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('error-msg');
            const btnLogin = document.getElementById('btn-login');

            errorMsg.style.display = 'none';
            btnLogin.disabled = true;
            btnLogin.textContent = t('signing_in_btn');

            const response = await apiCall('/users/login', 'POST', { email, password });

            if (response.success && response.data?.token) {
                const user = response.data;
                localStorage.setItem('token', user.token);
                localStorage.setItem('user', JSON.stringify(user));
                localStorage.setItem('lang', user.language || 'en');
                window.location.href = 'dashboard/owner.html';
            } else {
                errorMsg.textContent = response.message || 'Login failed!';
                errorMsg.style.display = 'block';
                btnLogin.disabled = false;
                btnLogin.textContent = t('sign_in_btn');
            }
        }

        if (localStorage.getItem('token')) {
            window.location.href = 'dashboard/owner.html';
        }
    </script>

</body>

</html>
