<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DriveTime — Sign In</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #0d0f12;
            --card-bg: #151820;
            --border: rgba(255, 255, 255, 0.07);
            --text: #f0f2f5;
            --text-sub: #5a6170;
            --text-label: #8a9099;
            --input-bg: #0d0f12;
            --input-border: rgba(255, 255, 255, 0.08);
            --placeholder: #3a4050;
            --icon-color: #3d4351;
            --footer: #3d4351;
            --divider: rgba(255, 255, 255, 0.05);
        }

        [data-theme="light"] {
            --bg: #f0f2f5;
            --card-bg: #ffffff;
            --border: rgba(0, 0, 0, 0.08);
            --text: #0f172a;
            --text-sub: #64748b;
            --text-label: #64748b;
            --input-bg: #f8fafc;
            --input-border: #e2e8f0;
            --placeholder: #94a3b8;
            --icon-color: #94a3b8;
            --footer: #94a3b8;
            --divider: #e2e8f0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            transition: background 0.3s;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(29, 158, 117, 0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(29, 158, 117, 0.04) 1px, transparent 1px);
            background-size: 48px 48px;
            pointer-events: none;
        }

        body::after {
            content: '';
            position: fixed;
            top: -20%;
            left: 50%;
            transform: translateX(-50%);
            width: 600px;
            height: 400px;
            background: radial-gradient(ellipse, rgba(29, 158, 117, 0.12) 0%, transparent 70%);
            pointer-events: none;
        }

        .theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 38px;
            height: 38px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: var(--card-bg);
            color: var(--text-sub);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 15px;
            z-index: 10;
            transition: all 0.2s;
        }

        .theme-toggle:hover {
            color: #1D9E75;
            border-color: rgba(29, 158, 117, 0.4);
        }

        .login-wrap {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 420px;
            padding: 0 20px;
        }

        .login-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 44px 40px;
            box-shadow: 0 24px 80px rgba(0, 0, 0, 0.3);
            transition: background 0.3s, border-color 0.3s;
        }

        .brand-mark {
            width: 52px;
            height: 52px;
            background: linear-gradient(135deg, #1D9E75 0%, #14745a 100%);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            box-shadow: 0 8px 24px rgba(29, 158, 117, 0.35);
            overflow: hidden;
        }

        .brand-mark i {
            color: #fff;
            font-size: 20px;
        }

        .brand-mark img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .login-heading {
            font-size: 22px;
            font-weight: 700;
            color: var(--text);
            text-align: center;
            letter-spacing: -0.3px;
            margin-bottom: 6px;
            transition: color 0.3s;
        }

        .login-sub {
            font-size: 13.5px;
            color: var(--text-sub);
            text-align: center;
            margin-bottom: 28px;
            transition: color 0.3s;
        }

        .btn-google {
            width: 100%;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 12px 14px;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            font-weight: 500;
            color: var(--text);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.2s;
            margin-bottom: 20px;
        }

        .btn-google:hover {
            border-color: rgba(29, 158, 117, 0.4);
            background: var(--input-bg);
        }

        .btn-google img {
            width: 18px;
            height: 18px;
        }

        .divider-or {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
        }

        .divider-or::before,
        .divider-or::after {
            content: '';
            flex: 1;
            border-top: 1px solid var(--divider);
            transition: border-color 0.3s;
        }

        .divider-or span {
            font-size: 12px;
            color: var(--text-sub);
            white-space: nowrap;
        }

        .field-group {
            margin-bottom: 16px;
        }

        .field-label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-label);
            text-transform: uppercase;
            letter-spacing: 0.6px;
            margin-bottom: 8px;
            transition: color 0.3s;
        }

        .field-input-wrap {
            position: relative;
        }

        .field-input-wrap .icon-left {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--icon-color);
            font-size: 14px;
            pointer-events: none;
            transition: color 0.2s;
        }

        .field-input {
            width: 100%;
            background: var(--input-bg);
            border: 1px solid var(--input-border);
            border-radius: 10px;
            padding: 12px 14px 12px 40px;
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            color: var(--text);
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s, background 0.3s, color 0.3s;
        }

        .field-input::placeholder {
            color: var(--placeholder);
        }

        .field-input:focus {
            border-color: rgba(29, 158, 117, 0.5);
            box-shadow: 0 0 0 3px rgba(29, 158, 117, 0.1);
        }

        .field-input-wrap:focus-within .icon-left {
            color: #1D9E75;
        }

        .error-banner {
            background: rgba(220, 53, 69, 0.1);
            border: 1px solid rgba(220, 53, 69, 0.2);
            border-radius: 10px;
            padding: 11px 14px;
            font-size: 13px;
            color: #f87171;
            margin-bottom: 16px;
            display: none;
            align-items: center;
            gap: 8px;
        }

        .btn-signin {
            width: 100%;
            background: #1D9E75;
            border: none;
            border-radius: 10px;
            padding: 13px;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            font-weight: 600;
            color: #fff;
            cursor: pointer;
            letter-spacing: 0.2px;
            margin-top: 8px;
            transition: background 0.2s, box-shadow 0.2s, transform 0.1s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-signin:hover:not(:disabled) {
            background: #22b585;
            box-shadow: 0 8px 24px rgba(29, 158, 117, 0.3);
        }

        .btn-signin:active:not(:disabled) {
            transform: scale(0.99);
        }

        .btn-signin:disabled {
            background: #1a3d30;
            color: #3d6e5a;
            cursor: not-allowed;
        }

        .divider-line {
            border: none;
            border-top: 1px solid var(--divider);
            margin: 24px 0 18px;
            transition: border-color 0.3s;
        }

        .footer-note {
            text-align: center;
            font-size: 12px;
            color: var(--footer);
            transition: color 0.3s;
        }
    </style>
</head>

<body>

    <button class="theme-toggle" onclick="toggleTheme()" id="btn-theme">
        <i class="fa-solid fa-moon" id="theme-icon"></i>
    </button>

    <div class="login-wrap">
        <div class="login-card">
            <div class="brand-mark" id="brand-mark">
                <i class="fa-solid fa-car-side" id="brand-icon"></i>
            </div>
            <h1 class="login-heading" id="txt-welcome"></h1>
            <p class="login-sub" id="txt-subtitle"></p>

            <button class="btn-google" onclick="googleLogin()" id="btn-google">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google">
                Continue with Google
            </button>

            <div class="divider-or"><span>or sign in with email</span></div>

            <div class="error-banner" id="error-msg">
                <i class="fa-solid fa-circle-exclamation"></i>
                <span id="error-text"></span>
            </div>

            <div class="field-group">
                <label class="field-label" id="txt-email-label"></label>
                <div class="field-input-wrap">
                    <i class="fa-regular fa-user icon-left"></i>
                    <input type="text" id="email" class="field-input" autocomplete="email">
                </div>
            </div>

            <div class="field-group">
                <label class="field-label" id="txt-password-label"></label>
                <div class="field-input-wrap">
                    <i class="fa-solid fa-lock icon-left"></i>
                    <input type="password" id="password" class="field-input" autocomplete="current-password">
                </div>
            </div>

            <button id="btn-login" class="btn-signin" onclick="login()">
                <i class="fa-solid fa-arrow-right-to-bracket"></i>
                <span id="btn-text"></span>
            </button>

            <hr class="divider-line">
            <p class="footer-note" id="txt-copyright">DriveTime Fleet Management &copy; 2025</p>
        </div>
    </div>



    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="translations.js"></script>
    <script>
        const IS_LOCAL = window.location.hostname === 'localhost'
            || window.location.hostname.includes('.test');

        const API_BASE = IS_LOCAL
            ? 'https://ibrahim.thewarriors.team/api'
            : 'https://ibrahim.thewarriors.team/api';

        const STORAGE_BASE = IS_LOCAL
            ? 'https://ibrahim.thewarriors.team'
            : 'https://ibrahim.thewarriors.team';

        // ── Theme ─────────────────────────────────────────────────
        function toggleTheme() {
            const isDark = document.documentElement.getAttribute('data-theme') !== 'light';
            document.documentElement.setAttribute('data-theme', isDark ? 'light' : 'dark');
            document.getElementById('theme-icon').className = isDark ? 'fa-solid fa-moon' : 'fa-solid fa-sun';
            localStorage.setItem('theme', isDark ? 'light' : 'dark');
        }
        const savedTheme = localStorage.getItem('theme') || 'dark';
        document.documentElement.setAttribute('data-theme', savedTheme);
        document.getElementById('theme-icon').className = savedTheme === 'light' ? 'fa-solid fa-moon' : 'fa-solid fa-sun';

        // ── Lang ──────────────────────────────────────────────────
        function applyLang() {
            document.getElementById('txt-welcome').textContent = t('welcome_back');
            document.getElementById('txt-subtitle').textContent = t('sign_in_subtitle');
            document.getElementById('txt-email-label').textContent = t('email_label');
            document.getElementById('txt-password-label').textContent = t('password_label');
            document.getElementById('email').placeholder = t('email_placeholder');
            document.getElementById('password').placeholder = t('password_placeholder');
            document.getElementById('btn-text').textContent = t('sign_in_btn');
        }
        applyLang();

        // ── System Settings ───────────────────────────────────────
        async function loadSystemSettings() {
            try {
                const res = await fetch(API_BASE + '/system-settings', {
                    headers: { 'Accept': 'application/json' }
                });
                const data = await res.json();

                if (!data.success) return;

                const settings = data.data;

                if (settings.logo) {
                    const brandMark = document.getElementById('brand-mark');
                    brandMark.innerHTML = `<img src="${STORAGE_BASE}/${settings.logo}" alt="logo">`;
                }

                // Copyright text
                if (settings.copyright_text) {
                    document.getElementById('txt-copyright').textContent = settings.copyright_text;
                }

                // Page title
                if (settings.system_name) {
                    document.title = settings.system_name + ' — Sign In';
                }

            } catch (err) {
                console.error('System settings error:', err);
            }
        }
        loadSystemSettings();

        // ── API ───────────────────────────────────────────────────
        async function apiCall(endpoint, method = 'GET', data = null) {
            const token = localStorage.getItem('token');
            const options = {
                method,
                headers: {
                    'Content-Type': 'application/json',
                    'Accept': 'application/json',
                    ...(token && { 'Authorization': `Bearer ${token}` }),
                },
            };
            if (data) options.body = JSON.stringify(data);
            try {
                const response = await fetch(API_BASE + endpoint, options);
                return await response.json();
            } catch (err) {
                return { success: false, message: 'Network error!' };
            }
        }

        function saveAndRedirect(user) {
            if (user.active_role !== 'owner') {
                showError('Access denied. Only owners can login here.');
                document.getElementById('btn-login').disabled = false;
                document.getElementById('btn-text').textContent = t('sign_in_btn');
                return;
            }
            localStorage.setItem('token', user.token);
            localStorage.setItem('user', JSON.stringify(user));
            localStorage.setItem('lang', user.language || 'en');
            window.location.href = 'dashboard/owner.html';
        }

        function showError(msg) {
            const errorMsg = document.getElementById('error-msg');
            const errorText = document.getElementById('error-text');
            errorText.textContent = msg;
            errorMsg.style.display = 'flex';
        }

        // ── Email / Username Login ────────────────────────────────
        async function login() {
            const input = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const btnLogin = document.getElementById('btn-login');
            const btnText = document.getElementById('btn-text');

            document.getElementById('error-msg').style.display = 'none';
            btnLogin.disabled = true;
            btnText.textContent = t('signing_in_btn');

            const isEmail = input.includes('@');
            const payload = isEmail
                ? { email: input, password }
                : { username: input, password };

            const response = await apiCall('/users/login', 'POST', payload);

            if (response.success && response.data?.token) {
                saveAndRedirect(response.data);
            } else {
                showError(response.message || 'Login failed. Please try again.');
                btnLogin.disabled = false;
                btnText.textContent = t('sign_in_btn');
            }
        }

        // ── Google Login ──────────────────────────────────────────
        async function handleGoogleCredential(googleResponse) {
            const btnGoogle = document.getElementById('btn-google');
            btnGoogle.disabled = true;
            btnGoogle.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i> Signing in...`;

            const response = await apiCall('/auth/social-login', 'POST', {
                provider: 'google',
                provider_id: googleResponse.credential,
            });

            if (response.success && response.data?.token) {
                saveAndRedirect(response.data);
            } else {
                showError(response.message || 'Google login failed.');
                btnGoogle.disabled = false;
                btnGoogle.innerHTML = `<img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google"> Continue with Google`;
            }
        }

        function googleLogin() {
            if (typeof google !== 'undefined') {
                google.accounts.id.prompt();
            }
        }

        window.addEventListener('load', () => {
            if (typeof google !== 'undefined') {
                google.accounts.id.initialize({
                    client_id: '885343649860-g9s417nuao9htjk95pmmc0gmeeqli503.apps.googleusercontent.com',
                    callback: handleGoogleCredential,
                    auto_select: false,
                    cancel_on_tap_outside: true,
                });
            }
        });

        document.addEventListener('keydown', e => { if (e.key === 'Enter') login(); });

        if (localStorage.getItem('token')) {
            window.location.href = 'dashboard/owner.html';
        }
    </script>
</body>

</html>
