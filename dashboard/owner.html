<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Owner Dashboard — DriveTime</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f4f6f9;
            --surface: #ffffff;
            --surface-2: #f8fafc;
            --border: #e2e8f0;
            --text-primary: #0f172a;
            --text-secondary: #64748b;
            --text-muted: #94a3b8;
            --brand: #10b981;
            --brand-dark: #059669;
            --brand-light: #d1fae5;
            --red: #ef4444;
            --orange: #f97316;
            --gray: #94a3b8;
            --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.06), 0 1px 2px rgba(0, 0, 0, 0.04);
            --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.08);
            --shadow-lg: 0 20px 60px rgba(0, 0, 0, 0.15);
            --radius: 14px;
            --radius-sm: 8px;
            --navbar-h: 64px;
        }

        [data-theme="dark"] {
            --bg: #0f172a;
            --surface: #1e293b;
            --surface-2: #162032;
            --border: #2d3f55;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-muted: #475569;
            --brand-light: #052e16;
            --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.3);
            --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.4);
            --shadow-lg: 0 20px 60px rgba(0, 0, 0, 0.6);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text-primary);
            min-height: 100vh;
            transition: background 0.3s, color 0.3s;
        }

        /* ── Navbar ── */
        .top-navbar {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 0 28px;
            height: var(--navbar-h);
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 200;
            box-shadow: var(--shadow-sm);
            transition: background 0.3s, border-color 0.3s;
        }

        .brand {
            font-size: 17px;
            font-weight: 700;
            color: var(--brand);
            display: flex;
            align-items: center;
            gap: 10px;
            letter-spacing: -0.3px;
        }

        .brand-logo {
            width: 34px;
            height: 34px;
            border-radius: 9px;
            object-fit: cover;
            display: none;
            box-shadow: var(--shadow-sm);
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--brand), var(--brand-dark));
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 13px;
            flex-shrink: 0;
        }

        .nav-name {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-primary);
        }

        .btn-theme {
            width: 36px;
            height: 36px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
            background: var(--surface-2);
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            transition: all 0.2s;
        }

        .btn-theme:hover {
            background: var(--brand-light);
            color: var(--brand);
            border-color: var(--brand);
        }

        .btn-logout {
            height: 36px;
            padding: 0 16px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s;
        }

        .btn-logout:hover {
            background: #fee2e2;
            color: var(--red);
            border-color: #fecaca;
        }

        /* ── Page ── */
        .page-wrapper {
            max-width: 1440px;
            margin: 0 auto;
            padding: 32px 28px;
        }

        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .section-title {
            font-size: 15px;
            font-weight: 600;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .section-title i {
            color: var(--brand);
            font-size: 14px;
        }

        .section-badge {
            background: #28987F;
            /* color: var(--brand); */
            font-size: 20px;
            color: white;
            font-weight: 600;
            padding: 3px 9px;
            border-radius: 20px;
        }

        /* ── Driver Cards ── */
        .drivers-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 16px;
        }

        .driver-card {
            border-radius: var(--radius);
            padding: 20px 22px;
            color: #fff;
            position: relative;
            overflow: hidden;
            box-shadow: var(--shadow-md);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .driver-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
        }

        .driver-card::before {
            content: '';
            position: absolute;
            top: -30px;
            right: -30px;
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.06);
        }

        .driver-card.available {
            background: #28987F;
        }

        .driver-card.on_delivery {
            background: #A4243B;
        }

        .driver-card.on_returning {
            background: #BD632F;
        }

        .driver-card.offline {
            background: #64748b;
        }

        .card-top {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
        }

        .card-avatar {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 14px;
            flex-shrink: 0;
            overflow: hidden;
        }

        .card-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .card-info {
            flex: 1;
        }

        .card-name {
            font-size: 15px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 7px;
        }

        .card-status-text {
            font-size: 11px;
            opacity: 0.75;
            margin-top: 2px;
            font-weight: 400;
        }

        .status-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            display: inline-block;
            flex-shrink: 0;
        }

        .status-dot.online {
            background: #86efac;
            box-shadow: 0 0 0 2px rgba(134, 239, 172, 0.3);
        }

        .status-dot.offline {
            background: #fca5a5;
        }

        .card-eta {
            font-size: 40px;
            font-weight: 700;
            opacity: 0.95;
            letter-spacing: -0.5px;
        }

        .card-eta span {
            font-size: 12px;
            font-weight: 400;
            opacity: 0.7;
        }

        .card-divider {
            border: none;
            border-top: 1px solid rgba(255, 255, 255, 0.15);
            margin: 0 0 14px;
        }

        .card-actions {
            display: flex;
            gap: 8px;
        }

        .btn-card {
            flex: 1;
            padding: 10px 0;
            border-radius: var(--radius-sm);
            border: none;
            cursor: pointer;
            font-size: 15px;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            transition: all 0.15s;
        }

        .btn-card-primary {
            background: rgba(255, 255, 255, 0.95);
            color: #0f172a;
        }

        .btn-card-primary:hover {
            background: #fff;
        }

        .btn-card-ghost {
            background: rgba(255, 255, 255, 0.15);
            color: #fff;
            max-width: 42px;
        }

        .btn-card-ghost:hover {
            background: rgba(255, 255, 255, 0.25);
        }

        /* ── Divider ── */
        .section-divider {
            margin: 36px 0;
            border: none;
            border-top: 1px solid var(--border);
        }

        /* ── Shift Cards ── */
        .tab-row {
            display: flex;
            gap: 6px;
        }

        .tab-pill {
            padding: 6px 18px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text-secondary);
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            transition: all 0.2s;
        }

        .tab-pill.active {
            background: var(--text-primary);
            color: var(--bg);
            border-color: var(--text-primary);
        }

        .tab-pill:not(.active):hover {
            background: var(--surface-2);
        }

        .shifts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 14px;
        }

        .shift-card {
            background: var(--surface);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            padding: 18px;
            box-shadow: var(--shadow-sm);
            transition: background 0.3s, border-color 0.3s, box-shadow 0.2s;
        }

        .shift-card:hover {
            box-shadow: var(--shadow-md);
        }

        .shift-card-top {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }

        .shift-icon {
            width: 42px;
            height: 42px;
            border-radius: 10px;
            background: var(--brand-light);
            color: var(--brand);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            flex-shrink: 0;
        }

        .shift-label {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .shift-time {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 3px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .shift-divider {
            border: none;
            border-top: 1px solid var(--border);
            margin: 10px 0;
        }

        .driver-avatars {
            display: flex;
            align-items: center;
        }

        .driver-avatar-item {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--brand), var(--brand-dark));
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 700;
            border: 2px solid var(--surface);
            margin-left: -8px;
            flex-shrink: 0;
            overflow: hidden;
        }

        .driver-avatar-item:first-child {
            margin-left: 0;
        }

        .driver-avatar-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .driver-names {
            font-size: 13px;
            color: var(--text-secondary);
            margin-left: 10px;
        }

        .shift-restaurant {
            font-size: 12px;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 5px;
            margin-top: 8px;
        }

        /* ── State box ── */
        .state-box {
            text-align: center;
            padding: 48px 24px;
            color: var(--text-muted);
            font-size: 14px;
            background: var(--surface);
            border-radius: var(--radius);
            border: 1px dashed var(--border);
        }

        .state-box i {
            font-size: 28px;
            margin-bottom: 10px;
            display: block;
            color: var(--border);
        }

        /* ── Track Modal ── */
        .track-modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .track-modal-overlay.open {
            display: flex;
        }

        .track-modal {
            background: var(--surface);
            border-radius: 20px;
            height: 85vh;
            width: 92%;
            max-width: 960px;
            overflow: hidden;
            box-shadow: var(--shadow-lg);
            border: 1px solid var(--border);
        }

        .track-modal-header {
            padding: 18px 22px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
            background: var(--surface);
        }

        .track-modal-title {
            font-size: 15px;
            font-weight: 600;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .track-modal-title i {
            color: var(--brand);
        }

        .track-modal-close {
            width: 32px;
            height: 32px;
            background: var(--surface-2);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 14px;
            cursor: pointer;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .track-modal-close:hover {
            background: #fee2e2;
            color: var(--red);
            border-color: #fecaca;
        }

        #track-map {
            flex: 1;
            width: 100%;
        }

        .track-modal-footer {
            padding: 12px 22px;
            font-size: 12px;
            color: var(--text-muted);
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--surface);
        }

        .track-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--brand);
            display: inline-block;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.3;
            }
        }

        .track-modal {
            display: flex;
            flex-direction: column;
        }

        #track-map {
            flex: 1;
            min-height: 0;
        }
    </style>
</head>

<body>

    <!-- Navbar -->
    <div class="top-navbar">
        <div class="brand">
            <img id="brand-logo" class="brand-logo" src="">
            <span id="brand-name">DriveTime</span>
        </div>
        <div class="nav-right">
            <div class="nav-avatar" id="nav-avatar"></div>
            <span class="nav-name" id="nav-name"></span>
            <button class="btn-theme" id="btn-theme" onclick="toggleTheme()" title="Toggle theme">
                <i class="fa-solid fa-moon" id="theme-icon"></i>
            </button>
            <button class="btn-logout" id="txt-logout" onclick="logout()">
                <i class="fa-solid fa-arrow-right-from-bracket"></i>
            </button>
        </div>
    </div>

    <!-- Page -->
    <div class="page-wrapper">

        <!-- Live Drivers -->
        <div class="section-header">
            <div class="section-title">
                <i class="fa-solid fa-circle-dot"></i>
                <span id="txt-live-drivers"></span>
            </div>
            <span class="section-badge" id="driver-count"></span>
        </div>
        <div class="drivers-grid" id="live-drivers">
            <div class="state-box"><i class="fa-solid fa-spinner fa-spin"></i>Loading drivers...</div>
        </div>

        <hr class="section-divider">

        <!-- Shifts -->
        <div class="section-header">
            <div class="section-title">
                <i class="fa-regular fa-calendar-days" style="color: rgb(132, 130, 134);"></i>
                <span id="txt-todays-shift"></span>
            </div>
            <div class="tab-row">
                <button class="tab-pill active" id="tab-today" onclick="loadShift('today')"></button>
                <button class="tab-pill" id="tab-tomorrow" onclick="loadShift('tomorrow')"></button>
            </div>
        </div>
        <div class="shifts-grid" id="shift-list">
            <div class="state-box"><i class="fa-solid fa-spinner fa-spin"></i>Loading shifts...</div>
        </div>

    </div>

    <!-- Track Modal -->
    <div class="track-modal-overlay" id="track-overlay" onclick="closeTrack(event)">
        <div class="track-modal">
            <div class="track-modal-header">
                <span class="track-modal-title">
                    <i class="fa-solid fa-location-dot"></i>
                    <span id="track-title">Tracking driver</span>
                </span>
                <button class="track-modal-close" onclick="closeTrackModal()">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>
            <div id="track-map"></div>
            <div class="track-modal-footer">
                <span class="track-dot"></span>
                <span id="track-updated">Connecting...</span>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/pusher-js@8.4.0/dist/web/pusher.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.min.js"></script>
    <script src="../translations.js"></script>
    <script>
        const API_BASE = 'https://admin.drivetime.io/api';
        const STORAGE_BASE = 'https://admin.drivetime.io/';
        const ORS_KEY = 'eyJvcmciOiI1YjNjZTM1OTc4NTExMTAwMDFjZjYyNDgiLCJpZCI6IjJiNWMwYTUxNWJjYTRjYjE5NzEyYWY2YmUzOTRhZmZiIiwiaCI6Im11cm11cjY0In0=';

        const notifiedAvailable = new Set();

        // ── Theme ─────────────────────────────────────────────────
        function toggleTheme() {
            const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
            document.documentElement.setAttribute('data-theme', isDark ? 'light' : 'dark');
            document.getElementById('theme-icon').className = isDark ? 'fa-solid fa-moon' : 'fa-solid fa-sun';
            localStorage.setItem('theme', isDark ? 'light' : 'dark');
        }
        const savedTheme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);
        document.getElementById('theme-icon').className = savedTheme === 'dark' ? 'fa-solid fa-sun' : 'fa-solid fa-moon';

        // ── Helpers ───────────────────────────────────────────────

        function playReturningSound() {
            const audio = new Audio('../alert.mp3');

            audio.onended = () => {
                audio.onended = null;
                audio.currentTime = 0;
                audio.play();
            };

            audio.play();
        }
        function avatarUrl(path) {
            if (!path) return null;
            if (path.startsWith('http')) return path;
            return STORAGE_BASE + '/' + path.replace(/^\//, '');
        }

        async function apiCall(endpoint, method = 'GET', data = null) {
            const token = localStorage.getItem('token');
            const options = {
                method,
                headers: {
                    'Content-Type': 'application/json',
                    'Accept': 'application/json',
                    ...(token && { 'Authorization': `Bearer ${token}` }),
                },
            };
            if (data) options.body = JSON.stringify(data);
            try {
                const response = await fetch(API_BASE + endpoint, options);
                return await response.json();
            } catch (err) {
                console.error('API Error:', err);
                return { success: false, message: 'Network error!' };
            }
        }

        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = '../index.html';
        }

        if (!localStorage.getItem('token')) window.location.href = '../index.html';

        // ── Lang ──────────────────────────────────────────────────
        function applyLang() {
            document.getElementById('txt-logout').innerHTML = `<i class="fa-solid fa-arrow-right-from-bracket"></i> ${t('logout')}`;
            document.getElementById('txt-live-drivers').textContent = t('live_drivers');
            document.getElementById('txt-todays-shift').textContent = t('todays_shift');
            document.getElementById('tab-today').textContent = t('today');
            document.getElementById('tab-tomorrow').textContent = t('tomorrow');
        }
        applyLang();

        // ── User ──────────────────────────────────────────────────
        const user = JSON.parse(localStorage.getItem('user'));
        const restaurantName = user.restaurant?.name || 'DriveTime';
        const restaurantLogo = user.restaurant?.logo;

        document.getElementById('nav-name').textContent = user.name;
        document.getElementById('nav-avatar').textContent = user.name.slice(0, 2).toUpperCase();
        document.getElementById('brand-name').textContent = restaurantName;

        if (restaurantLogo) {
            const logo = document.getElementById('brand-logo');
            logo.src = avatarUrl(restaurantLogo);
            logo.style.display = 'block';
        }

        // ── Pusher ────────────────────────────────────────────────
        let locationChannel = null;
        const pusher = new Pusher('72d8a19b7510d43a0ffe', { cluster: 'ap2', forceTLS: true });
        pusher.subscribe('restaurant.drivers').bind('driver.status.updated', () => loadLiveDrivers());

        // ── Live Drivers ──────────────────────────────────────────
        async function loadLiveDrivers() {
            const res = await apiCall('/restaurant/driver/stage');
            const el = document.getElementById('live-drivers');

            if (!res.success || !res.data?.length) {
                document.getElementById('driver-count').textContent = '';
                document.getElementById('driver-count').style.display = 'none'
                el.innerHTML = `<div class="state-box"><i class="fa-solid fa-circle-xmark"></i>${t('no_drivers')}</div>`;
                return;
            }

            document.getElementById('driver-count').textContent = `${res.data.length} active`;
            document.getElementById('driver-count').style.display = 'inline-block';

            el.innerHTML = res.data.map(d => {
                const av = avatarUrl(d.avatar);
                const avatarHtml = av
                    ? `<div class="card-avatar"><img src="${av}" alt="${d.driver_name}"></div>`
                    : `<div class="card-avatar">${d.driver_name.slice(0, 2).toUpperCase()}</div>`;

                const eta = (d.card_type === 'on_returning' && d.eta_minutes > 0)
                    ? `<div class="card-eta">${d.eta_minutes}<span> min</span></div>` : '';

                const dot = d.is_online ? 'online' : 'offline';
                const statusText = d.card_type === 'available' ? t('available')
                    : d.card_type === 'on_delivery' ? t('on_delivery')
                        : d.card_type === 'on_returning' ? t('on_returning')
                            : t('offline');

                let actionBtn = '';
                if (d.card_type === 'on_delivery' || d.card_type === 'on_returning') {

                    if (d.card_type === 'on_returning') {
                        playReturningSound();
                    }

                    actionBtn = `<button class="btn-card btn-card-primary" onclick="openTrack(${d.driver_id}, '${d.driver_name}')">
                        <i class="fa-solid fa-map-location-dot"></i> ${t('track')}
                    </button>`;
                } else if (d.card_type === 'available') {
                    if (!notifiedAvailable.has(d.driver_id)) {
                        notifiedAvailable.add(d.driver_id);
                    }
                    actionBtn = `<button class="btn-card btn-card-primary" onclick="notifyDriver(${d.driver_id}, this)">
        <i class="fa-solid fa-bell"></i> ${t('order_ready')}
    </button>`;
                } else {
                    notifiedAvailable.delete(d.driver_id);
                }

                return `
            <div class="driver-card ${d.card_type}">
                <div class="card-top">
                    ${avatarHtml}
                    <div class="card-info">
                        <div class="card-name">
                            <span class="status-dot ${dot}"></span>
                            ${d.driver_name}
                        </div>
                        <div class="card-status-text">${statusText}</div>
                    </div>
                    ${eta}
                </div>
                <hr class="card-divider">
                <div class="card-actions">
                    ${actionBtn}
                </div>
            </div>`;
            }).join('');
        }

        async function loadShift(day = 'today') {
            document.getElementById('tab-today').classList.toggle('active', day === 'today');
            document.getElementById('tab-tomorrow').classList.toggle('active', day === 'tomorrow');

            const res = await apiCall(`/restaurant/today-driver?day=${day}`);
            const el = document.getElementById('shift-list');

            if (!res.success || !res.data?.length) {
                el.innerHTML = `<div class="state-box"><i class="fa-solid fa-calendar-xmark"></i>${t('no_shifts')}</div>`;
                return;
            }

            el.innerHTML = res.data.map(d => {
                const icon = d.shift === 'morning' ? 'fa-sun' : d.shift === 'afternoon' ? 'fa-cloud-sun' : 'fa-moon';
                const label = d.shift === 'morning' ? t('morning') : d.shift === 'afternoon' ? t('afternoon') : t('evening');

                const av = avatarUrl(d.avatar);
                const avatarHtml = av
                    ? `<div class="driver-avatar-item"><img src="${av}" alt="${d.driver_name}"></div>`
                    : `<div class="driver-avatar-item">${d.driver_name.slice(0, 2).toUpperCase()}</div>`;

                return `
                <div class="shift-card">
                    <div class="shift-card-top">
                        ${avatarHtml}
                        <div>
                            <div class="shift-label">${d.driver_name}</div>
                            <div class="shift-time">
                                <i class="fa-regular fa-clock"></i>
                                ${d.from_time} &ndash; ${d.to_time} &nbsp;|&nbsp; <i class="fa-solid ${icon}"></i> ${label}
                            </div>
                        </div>
                    </div>

                </div>`;
            }).join('');
        }

        // ── Track Map ─────────────────────────────────────────────
        let trackMap = null, driverMarker = null, restaurantMarker = null;
        let routeLine = null, trackInterval = null, currentDriverId = null;

        const driverIcon = L.divIcon({
            html: `<div style="background:#ef4444;width:38px;height:38px;border-radius:50%;border:3px solid #fff;box-shadow:0 3px 10px rgba(0,0,0,0.25);display:flex;align-items:center;justify-content:center;color:#fff;font-size:15px;"><i class="fa-solid fa-car-side"></i></div>`,
            className: '', iconSize: [38, 38], iconAnchor: [19, 19],
        });
        const restaurantIcon = L.divIcon({
            html: `<div style="background:#10b981;width:38px;height:38px;border-radius:10px;border:3px solid #fff;box-shadow:0 3px 10px rgba(0,0,0,0.25);display:flex;align-items:center;justify-content:center;color:#fff;font-size:15px;"><i class="fa-solid fa-store"></i></div>`,
            className: '', iconSize: [38, 38], iconAnchor: [19, 19],
        });

        async function drawRoute(dLat, dLng, rLat, rLng) {
            try {
                const dist = trackMap.distance([dLat, dLng], [rLat, rLng]);
                if (dist < 100) {
                    if (routeLine) trackMap.removeLayer(routeLine);
                    routeLine = L.polyline([[dLat, dLng], [rLat, rLng]], { color: '#10b981', weight: 3, dashArray: '6,8' }).addTo(trackMap);
                    return;
                }
                const res = await fetch('https://api.openrouteservice.org/v2/directions/driving-car/geojson', {
                    method: 'POST',
                    headers: { 'Authorization': ORS_KEY, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ coordinates: [[dLng, dLat], [rLng, rLat]] })
                });
                const data = await res.json();
                if (!data.features?.[0]) return;
                const coords = data.features[0].geometry.coordinates.map(c => [c[1], c[0]]);
                if (routeLine) trackMap.removeLayer(routeLine);
                routeLine = L.polyline(coords, { color: '#10b981', weight: 4, opacity: 0.85 }).addTo(trackMap);
            } catch (err) { console.error('Route error:', err); }
        }

        async function openTrack(driverId, driverName) {
            currentDriverId = driverId;
            document.getElementById('track-title').textContent = driverName;
            document.getElementById('track-overlay').classList.add('open');
            if (!trackMap) {
                trackMap = L.map('track-map').setView([50.85, 4.35], 12);
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OpenStreetMap' }).addTo(trackMap);
            }
            await updateTrackLocation();
            locationChannel = pusher.subscribe(`driver.${driverId}`);
            locationChannel.bind('location.updated', (raw) => {
                updateMarkersOnly(parseFloat(raw.data.latitude), parseFloat(raw.data.longitude));
            });
            trackInterval = setInterval(updateTrackLocation, 2000);
        }

        async function notifyDriver(driverId, btn) {
            btn.disabled = true;
            btn.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i> Sending...`;

            const res = await apiCall(`/notify-driver/${driverId}`, 'POST');

            if (res.success) {
                btn.innerHTML = `<i class="fa-solid fa-check"></i> Notified`;
                btn.style.background = 'rgba(255,255,255,0.5)';
                setTimeout(() => {
                    btn.disabled = false;
                    btn.style.background = '';
                    btn.innerHTML = `<i class="fa-solid fa-bell"></i> ${t('order_ready')}`;
                }, 3000);
            } else {
                btn.disabled = false;
                btn.innerHTML = `<i class="fa-solid fa-bell"></i> ${t('order_ready')}`;
                alert(res.message || 'Failed to notify driver');
            }
        }


        async function updateTrackLocation() {
            const res = await apiCall(`/driver/${currentDriverId}/location`);
            if (!res.success) return;
            const { driver, restaurant } = res.data;
            const dLat = parseFloat(driver.latitude), dLng = parseFloat(driver.longitude);
            const rLat = parseFloat(restaurant.latitude), rLng = parseFloat(restaurant.longitude);

            if (driverMarker) driverMarker.setLatLng([dLat, dLng]);
            else driverMarker = L.marker([dLat, dLng], { icon: driverIcon }).addTo(trackMap).bindPopup(driver.name || 'Driver');

            if (restaurantMarker) {
                restaurantMarker.setLatLng([rLat, rLng]);
            } else {
                const logoUrl = restaurantLogo ? avatarUrl(restaurantLogo) : null;
                const dynIcon = L.divIcon({
                    html: logoUrl
                        ? `<div style="width:42px;height:42px;border-radius:10px;border:3px solid #fff;box-shadow:0 3px 10px rgba(0,0,0,0.25);overflow:hidden;"><img src="${logoUrl}" style="width:100%;height:100%;object-fit:cover;"></div>`
                        : `<div style="background:#10b981;width:38px;height:38px;border-radius:10px;border:3px solid #fff;box-shadow:0 3px 10px rgba(0,0,0,0.25);display:flex;align-items:center;justify-content:center;color:#fff;font-size:15px;"><i class="fa-solid fa-store"></i></div>`,
                    className: '', iconSize: [42, 42], iconAnchor: [21, 21],
                });
                restaurantMarker = L.marker([rLat, rLng], { icon: dynIcon }).addTo(trackMap).bindPopup(restaurantName);
            }

            await drawRoute(dLat, dLng, rLat, rLng);
            trackMap.fitBounds([[dLat, dLng], [rLat, rLng]], { padding: [50, 50] });
            document.getElementById('track-updated').textContent = 'Last updated: ' + new Date().toLocaleTimeString();
            setTimeout(() => trackMap.invalidateSize(), 100);
        }

        function updateMarkersOnly(dLat, dLng) {
            if (!driverMarker || !trackMap) return;
            driverMarker.setLatLng([dLat, dLng]);
            if (restaurantMarker) {
                const r = restaurantMarker.getLatLng();
                drawRoute(dLat, dLng, r.lat, r.lng);
            }
            document.getElementById('track-updated').textContent = 'Last updated: ' + new Date().toLocaleTimeString();
        }

        function closeTrackModal() {
            document.getElementById('track-overlay').classList.remove('open');
            clearInterval(trackInterval); trackInterval = null; currentDriverId = null;
            if (locationChannel) { locationChannel.unbind_all(); pusher.unsubscribe(locationChannel.name); locationChannel = null; }
            if (routeLine) { trackMap.removeLayer(routeLine); routeLine = null; }
            if (driverMarker) { trackMap.removeLayer(driverMarker); driverMarker = null; }
            if (restaurantMarker) { trackMap.removeLayer(restaurantMarker); restaurantMarker = null; }
        }
        function closeTrack(e) { if (e.target === document.getElementById('track-overlay')) closeTrackModal(); }

        // ── Init ──────────────────────────────────────────────────
        loadLiveDrivers();
        loadShift('today');
        setInterval(() => { if (!document.hidden) loadLiveDrivers(); }, 10000);
    </script>
